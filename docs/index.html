<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevFlow — 발표 자료</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --primary: #60a5fa;
    --secondary: #93c5fd;
    --muted: #94a3b8;
    --text: #f1f5f9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .wrapper { max-width: 640px; width: 100%; }
  header { text-align: center; margin-bottom: 48px; }
  header h1 { font-size: 2.4em; color: var(--primary); margin-bottom: 8px; }
  header p { color: var(--muted); font-size: 0.95em; line-height: 1.6; }
  header .sub { margin-top: 12px; color: #64748b; font-size: 0.8em; }

  .cards { display: flex; flex-direction: column; gap: 16px; }
  .card {
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--card);
    border-radius: 14px;
    padding: 24px 28px;
    text-decoration: none;
    color: inherit;
    border: 1px solid #2d3748;
    transition: transform 0.15s, border-color 0.15s;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--primary); }
  .card-icon { font-size: 2em; flex-shrink: 0; }
  .card-body { flex: 1; }
  .card-title { font-size: 1.1em; font-weight: bold; color: var(--secondary); margin-bottom: 4px; }
  .card-desc { color: var(--muted); font-size: 0.85em; line-height: 1.5; }
  .card-arrow { color: #4b5563; font-size: 1.2em; flex-shrink: 0; }
  .card:hover .card-arrow { color: var(--primary); }

  footer { text-align: center; margin-top: 48px; color: #475569; font-size: 0.8em; }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>💻 DevFlow</h1>
    <p>개발자의 루틴과 일정을 한 곳에서 관리하고,<br><strong style="color:var(--primary)">꾸준함을 숫자로 증명한다.</strong></p>
    <p class="sub">김찬희 · 앱프로그래밍 · 2026</p>
  </header>

  <div class="cards">
    <a class="card" href="presentation/interim.html">
      <span class="card-icon">🖥️</span>
      <div class="card-body">
        <div class="card-title">중간 발표 슬라이드</div>
        <div class="card-desc">문제 정의 · 아키텍처 · 진행 상황 · 남은 일정<br>reveal.js 프레젠테이션</div>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="wbs.html">
      <span class="card-icon">📋</span>
      <div class="card-body">
        <div class="card-title">WBS (작업 분류 체계)</div>
        <div class="card-desc">전체 구현 항목 · 완료/예정 현황 · 주차별 진척률</div>
      </div>
      <span class="card-arrow">→</span>
    </a>
  </div>

  <footer>DevFlow · Flutter · Riverpod · SQLite</footer>
</div>
</body>
</html>
